<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Giriş Yap — CineMatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="app-shell">
  {% include '_nav.html' %}

  <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:64px 16px">
    <div class="auth-wrap">
      <div style="text-align:center;margin-bottom:32px">
        <span class="eyebrow"><span class="dot"></span> Hesabına Giriş</span>
        <h1 class="section-title" style="font-size:32px;margin-top:16px;margin-bottom:8px">Giriş Yap</h1>
        <p class="section-sub" style="margin:0">Öneri geçmişini görmek ve beğenilerini kaydetmek için giriş yap.</p>
      </div>

      {% if hata %}
      <div class="auth-alert auth-alert-error">{{ hata }}</div>
      {% endif %}

      <form class="card auth-card" method="POST" action="/giris">
        <div style="margin-bottom:16px">
          <label class="field-label" for="email">E-posta</label>
          <input class="field-input" id="email" name="email" type="email"
                 placeholder="ornek@mail.com" required autocomplete="email"/>
        </div>
        <div style="margin-bottom:24px">
          <label class="field-label" for="sifre">Şifre</label>
          <input class="field-input" id="sifre" name="sifre" type="password"
                 placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button class="submit-btn" type="submit" style="width:100%;justify-content:center">
          Giriş Yap
        </button>
        <div class="auth-link-row">
          <a href="/sifre-sifirla" class="auth-link">Şifremi unuttum</a>
        </div>
      </form>

      <p style="text-align:center;color:var(--text-2);font-size:14px;margin-top:20px">
        Hesabın yok mu?
        <a href="/kayit" class="auth-link" style="font-weight:600">Kayıt Ol</a>
      </p>
    </div>
  </main>

  {% include '_footer.html' %}
</div>
</body>
</html>
